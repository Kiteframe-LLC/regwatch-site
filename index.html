<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RegWatch Public Feed</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>RegWatch Public Feed</h1>
      <p id="meta">Loading…</p>
    </header>

    <main>
      <section class="controls">
        <label>
          Filter agency:
          <input id="agencyFilter" type="text" placeholder="EPA, DOJ, CMS…" />
        </label>
        <label>
          Min combined score:
          <input id="minScore" type="number" step="0.01" value="0.75" />
        </label>
        <button id="resetBtn" type="button">Reset</button>
      </section>

      <section>
        <table id="rulesTable">
          <thead>
            <tr>
              <th>Combined</th>
              <th>Agency</th>
              <th>Document ID</th>
              <th>Title</th>
              <th>Pass 1</th>
              <th>Pass 2</th>
              <th>Risk Band</th>
              <th>Comment Ends</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
